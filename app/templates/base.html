<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>{% block title %}Sistema{% endblock %}</title>
</head>
<body>

  <nav>
      <a href="/create-driver"
        style="{% if request.path == '/create-driver' %}font-weight:bold;{% endif %}">
        Cadastrar Motorista
      </a> |

      <a href="/list-drivers"
        style="{% if request.path == '/list-drivers' %}font-weight:bold;{% endif %}">
        Listar Motoristas
      </a>
  </nav>


  <div class="container">
    {% block content %}{% endblock %}
  </div>

</body>
</html>
